<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta Data -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volti - Book Your Eco-Friendly Ride</title>
    <meta name="title" content="Volti - Book Your Eco-Friendly Ride">
    <meta name="description" content="This is a vehicle charging html template (credit to the owner)">

    <!-- Icon -->
    <link rel="shortcut icon" href="./favicon.svg" type="img/svg+xml">

    <!-- External CSS -->
    <link rel="stylesheet" href="./assets/css/style.css">

    <!-- Pre Loader Images -->
     <link rel="preload" href="./assets/images/loading.svg">
     <link rel="preload" href="./assets/images/loading-circle.svg">
     <link rel="preload" href="./assets/images/hero-banner.png">

</head>
<body id="top">
    <!-- Pre Loader --> 
    <div class="preload-box" data-preloader>
        <img src="./assets/images/loading.svg" alt="loading" width="45" height="45">
        <img src="./assets/images/loading-circle.svg" width="75" height="75" alt="loading" class="preload-circle">
    </div>

    <!-- Header -->
     <header class="header" data-header>
        <div class="container">
            <a href="#" class="logo">
                <img src="./assets/images/logo.svg" width="160" height="50" alt="logo">
            </a>

            <nav class="navbar" data-navbar>
                <ul class="navbar-list">

                    <li class="navbar-item">
                        <a href="#" class="navbar-link">Home</a>
                    </li>
                    <li class="navbar-item">
                        <a href="#" class="navbar-link">Services</a>
                    </li>
                    <li class="navbar-item">
                        <a href="#" class="navbar-link">Gallery</a>
                    </li>
                    <li class="navbar-item">
                        <a href="#" class="navbar-link">Blog</a>
                    </li>
                    <li class="navbar-item">
                        <a href="#" class="navbar-link">Contact Us</a>
                    </li>
                </ul>
            </nav>

            <div class="header-action">

                <a href="tel:+12312345678901" class="contact-number">
                    <ion-icon name="call-outline" aria-hidden="true"></ion-icon>
                    <span class="span">+(123) 1234-567-8981</span>
                </a>

                <a href="#" class="btn btn-prrimary">
                    <span class="span">Get a quote</span>

                    <ion-icon name="arrow-forward" aria-hidden="true"></ion-icon>
                </a>
            </div>

            <button class="nav-toggle-btn" aria-label = "toggle menu" data-nav-toggler>
                <ion-icon name="menu-outline" aria-hidden="true" class="open"></ion-icon>
                <ion-icon name="close-outline" aria-hidden="true" class="close"></ion-icon>
            </button>
        </div>
     </header>


     <main>
        <article>
            <!-- HERO -->
             <section class="section hero" aria-label="home">
                <div class="container">
                    <div class="hero-content" data-reveal="left">
                        <h1 class="h1 hero-title">
                            Book Your <span class="span">New Eco-Friendly </span>Ride.
                        </h1>

                        <ul class="hero-list">
                            <li>
                                <div class="hero-card">
                                    <ion-icon name="speedometer-outline" aria-hidden="true"></ion-icon>

                                    <p class="card-subtitle">Top speed</p>

                                    <p class="card-title">80 km/h</p>
                                </div>
                            </li>

                            <li>
                                <div class="hero-card">
                                    <ion-icon name="stopwatch-outline" aria-hidden="true"></ion-icon>

                                    <p class="card-subtitle">0-40 km/hr in</p>

                                    <p class="card-title">3.3 sec</p>
                                </div>
                            </li>

                            <li>
                                <div class="hero-card">
                                    <ion-icon name="checkmark-done-circle-outline" aria-hidden="true"></ion-icon>

                                    <p class="card-subtitle">Certified Range</p>

                                    <p class="card-title">116 km</p>
                                </div>
                            </li>
                        </ul>

                        <a href="#" class="btn btn-primary">
                            <span class="span">Book Now</span>

                            <ion-icon name="arrow-forward-outline" aria-hidden="true"></ion-icon>
                        </a>
                    </div>

                    <figure class="hero-banner" data-reveal="right">
                        <img src="./assets/images/hero-banner.png" alt="Bike" width="1116" height="766" class="w-100">
                    </figure>
                </div>
             </section>
        </article>
     </main>

    <!-- external js link -->
    <script src="./assets/js/script.js" type="module"></script>

    <!-- ion icon link -->
     <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</body>
</html>
